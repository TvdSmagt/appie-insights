name: Package executables

# Builds the self-contained single-file executables on native runners (one per
# OS, because PyInstaller can't cross-compile) and uploads them as artifacts.
# Pushing a version tag (v*) also attaches them to the GitHub Release.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to attach assets to a release on tag pushes

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            ext: ""
            bin: dist/appie-insights
          - os: macos-latest # Apple Silicon
            platform: macos-arm64
            ext: ""
            bin: dist/appie-insights
          - os: windows-latest
            platform: windows-amd64
            ext: ".exe"
            bin: dist/appie-insights.exe
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so `git describe` can stamp the version

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          # Only the backend has dependencies (a go.sum); point the module
          # cache at it so setup-go doesn't fail looking for go.sum at the root.
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging deps
        run: |
          python -m pip install --upgrade pip
          pip install -r dashboard/requirements.txt pyinstaller

      # Unix build (Linux + macOS) via the shared bash script.
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: bash packaging/scripts/build.sh

      # Windows build via the PowerShell script.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\packaging\scripts\build-windows.ps1

      # Prove the freshly built single-file binary actually runs on this OS:
      # launch it headless, wait for the bundled backend + dashboard to come up
      # and answer HTTP, then shut it down. Fails the job if it doesn't.
      - name: Smoke-test binary
        shell: bash
        run: bash packaging/scripts/smoke-test.sh "${{ matrix.bin }}"

      # Stamp the version into the asset filename so a downloaded file is
      # self-identifying. Mirror the build scripts' exact-match -> dirty
      # fallback so the name matches the version compiled into the binary.
      - name: Build asset name
        id: asset
        shell: bash
        run: |
          if VERSION=$(git describe --tags --exact-match 2>/dev/null); then :;
          elif VERSION=$(git describe --tags --dirty 2>/dev/null); then :;
          elif COMMIT=$(git rev-parse --short HEAD 2>/dev/null); then VERSION="prerelease+$COMMIT";
          else VERSION="development"; fi
          echo "name=appie-insights-${VERSION}-${{ matrix.platform }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.bin }}" "out/${{ steps.asset.outputs.name }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.asset.outputs.name }}
          path: out/${{ steps.asset.outputs.name }}
          if-no-files-found: error
          retention-days: 7

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: out/${{ steps.asset.outputs.name }}
